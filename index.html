<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranmza GT - Manual do Usuário</title>
  <meta name="description" content="Manual do usuário do Ranmza Game Translator">

  <!-- Docsify base theme (vue) + override completo com Dracula -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Prism Dracula syntax highlight -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1/themes/prism-dracula.css">

  <style>
    /* ════════════════════════════════════════════════════════
       DRACULA THEME — Ranmza GT Docs
       Paleta oficial: https://draculatheme.com/contribute
    ════════════════════════════════════════════════════════ */

    /* ── Tokens ── */
    :root {
      --drac-bg:       #282A36;
      --drac-current:  #44475A;
      --drac-fg:       #F8F8F2;
      --drac-comment:  #6272A4;
      --drac-cyan:     #8BE9FD;
      --drac-green:    #50FA7B;
      --drac-orange:   #FFB86C;
      --drac-pink:     #FF79C6;
      --drac-purple:   #BD93F9;
      --drac-red:      #FF5555;
      --drac-yellow:   #F1FA8C;
    }

    /* ── Base ── */
    body  { background: var(--drac-bg) !important; color: var(--drac-fg) !important; }
    #app  { color: var(--drac-fg); }

    /* ── Sidebar ── */
    .sidebar {
      background: #21222C !important;
      border-right: 1px solid var(--drac-current) !important;
    }
    .sidebar .app-name-link { color: var(--drac-purple) !important; }
    .sidebar ul li a          { color: var(--drac-comment) !important; }
    .sidebar ul li a:hover    { color: var(--drac-fg) !important; }
    .sidebar ul li.active > a {
      color: var(--drac-purple) !important;
      border-right: 2px solid var(--drac-purple) !important;
    }

    /* ── Conteúdo principal ── */
    .markdown-section {
      color: var(--drac-fg) !important;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      color: var(--drac-fg) !important;
    }
    .markdown-section h2 { color: var(--drac-cyan) !important; border-bottom: 1px solid var(--drac-current) !important; }
    .markdown-section h3 { color: var(--drac-cyan) !important; }

    /* Headings sao links no Docsify (h2 > a.anchor > span). O link e o span herdam
       a cor do nivel — senao o texto pegaria o roxo de link / o cinza "comment". */
    .markdown-section .anchor,
    .markdown-section .anchor span { color: inherit !important; }

    /* Parágrafos, listas */
    .markdown-section p,
    .markdown-section li,
    .markdown-section td  { color: var(--drac-fg) !important; }
    .markdown-section strong { color: var(--drac-orange) !important; }
    .markdown-section em     { color: var(--drac-yellow) !important; font-style: italic; }
    .markdown-section a      { color: var(--drac-purple) !important; }
    .markdown-section a:hover { color: var(--drac-pink) !important; }

    /* Blockquote / callout */
    .markdown-section blockquote {
      border-left: 3px solid var(--drac-purple) !important;
      background: rgba(68,71,90,.45) !important;
      color: var(--drac-fg) !important;
    }
    .markdown-section blockquote p,
    .markdown-section blockquote li { color: var(--drac-fg) !important; }

    /* Código inline */
    .markdown-section code {
      background: var(--drac-current) !important;
      color: var(--drac-pink) !important;
      border: none !important;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
    }

    /* Bloco de código */
    .markdown-section pre {
      background: #1E1F29 !important;
      border: 1px solid var(--drac-current) !important;
    }
    .markdown-section pre > code {
      background: transparent !important;
      color: var(--drac-fg) !important;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace !important;
    }

    /* Tabelas */
    .markdown-section tr     { background: var(--drac-bg) !important; border-top: 1px solid var(--drac-current) !important; }
    .markdown-section tr:nth-child(2n) { background: rgba(68,71,90,.3) !important; }
    .markdown-section th,
    .markdown-section td     { border: 1px solid var(--drac-current) !important; }
    .markdown-section th     { background: #21222C !important; color: var(--drac-purple) !important; }

    /* HR */
    .markdown-section hr { border-bottom: 1px solid var(--drac-current) !important; }

    /* Imagens */
    .markdown-section img { border-radius: 6px; }

    /* ── Barra de busca ── */
    .search input {
      background: var(--drac-current) !important;
      color: var(--drac-fg) !important;
      border: 1px solid transparent !important;
      border-radius: 6px !important;
    }
    .search input:focus { border-color: var(--drac-purple) !important; }
    .search input::placeholder { color: var(--drac-comment) !important; }
    .search .results-panel    { background: var(--drac-bg) !important; }
    .search .matching-post    { border-bottom: 1px solid var(--drac-current) !important; }
    .search p                 { color: var(--drac-comment) !important; }
    .search .search-keyword   { color: var(--drac-purple) !important; }
    .search h2,
    .search .matching-post h2 { color: var(--drac-fg) !important; }

    /* ── Cover page (caso use) ── */
    section.cover { background: var(--drac-bg) !important; }
    section.cover h1, section.cover p { color: var(--drac-fg) !important; }
    section.cover a.anchor { color: var(--drac-purple) !important; }

    /* ── Botão de alternar tema ── */
    #theme-toggle {
      position: fixed; top: 14px; right: 16px; z-index: 100;
      width: 38px; height: 38px; border-radius: 8px;
      border: 1px solid var(--drac-current);
      background: #21222C;
      color: var(--drac-fg);
      cursor: pointer; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      transition: border-color .15s, color .15s;
    }
    #theme-toggle:hover { border-color: var(--drac-purple); color: var(--drac-purple); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--drac-bg); }
    ::-webkit-scrollbar-thumb { background: var(--drac-current); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--drac-comment); }

    /* ── Light mode (Alucard) — ativado via botão ── */
    html[data-theme="light"] {
      --drac-bg:      #F8F8F2;
      --drac-current: #E8E8DC;
      --drac-fg:      #282A36;
      --drac-comment: #6272A4;
      --drac-purple:  #6D31F5;
      --drac-cyan:    #0397C8;
      --drac-pink:    #C2185B;
      --drac-orange:  #D07010;
      --drac-yellow:  #8A7300;
      --drac-green:   #2A8A2A;
    }
    html[data-theme="light"] .sidebar,
    html[data-theme="light"] #theme-toggle { background: #EEEEE8 !important; }
  </style>

  <!-- Define tema ANTES de pintar (sem flash) -->
  <script>
    (function(){
      var k = 'ranmza-doc-theme', s = null;
      try { s = localStorage.getItem(k); } catch(e) {}
      if (!s) s = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s);
    })();
  </script>
</head>
<body>

  <button id="theme-toggle" onclick="RToggleTheme()" aria-label="Alternar tema" title="Alternar tema claro/escuro">🌙</button>

  <div id="app">Carregando o manual...</div>

  <script>
    window.$docsify = {
      name: 'Ranmza GT',
      repo: 'https://github.com/BrunoDomenesDutra/ranmzagt',
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Buscar no manual...',
        noData: 'Nada encontrado.',
        depth: 3
      }
    };

    function RSyncThemeBtn() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var b = document.getElementById('theme-toggle');
      if (b) b.innerHTML = dark ? '&#9728;&#65039;' : '&#127769;';
    }

    function RToggleTheme() {
      var k = 'ranmza-doc-theme';
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      try { localStorage.setItem(k, next); } catch(e) {}
      document.documentElement.setAttribute('data-theme', next);
      RSyncThemeBtn();
    }

    RSyncThemeBtn();
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Syntax highlighting com tema Dracula -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

</body>
</html>
